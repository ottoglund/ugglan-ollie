<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ugglan Ollie — Offline</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        background: #f2f2f7;
        color: #111;
        display: grid;
        place-items: center;
        height: 100vh;
        padding: 24px;
      }
      .card {
        background: #fff;
        border-radius: 18px;
        padding: 18px 16px;
        max-width: 420px;
        box-shadow: 0 10px 30px rgba(0,0,0,.10);
      }
      .title {
        font-weight: 800;
        margin: 0 0 8px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .muted { color: #555; margin: 0; line-height: 1.4; }
      .btn {
        margin-top: 14px;
        display: inline-block;
        background: #007aff;
        color: #fff;
        padding: 10px 14px;
        border-radius: 12px;
        text-decoration: none;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1 class="title">🦉 Ugglan Ollie</h1>
      <p class="muted">
        Du verkar vara offline just nu. När internet kommer tillbaka kan du fortsätta chatta.
      </p>
      <a class="btn" href="/">Försök igen</a>
    </div>
  </body>
</html>
